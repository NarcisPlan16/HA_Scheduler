# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Optimal Scheduler
version: "4.5"
slug: optimal_scheduler
description: Scheduler & optimizer add-on for smart grids for energy management and cost savings.
url: "https://github.com/NarcisPlan16/HA_Scheduler/tree/main/optimal_scheduler"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
boot: manual
homeassistant_api: true
auth_api: true
hassio_api: true
map:
  - share:rw
  - addon_config:rw
options:
  Controllable_Consumer_asset_IDs: []
  Controllable_Generator_asset_IDs: []
  Controllable_Energy_Source_asset_IDs: []
  Base_Building_consumption_IDs: []
  Base_Building_generation_IDs: []
  Simulation_code_directory: /config/OptimalScheduler/MySimulationCode
  Classes_code_directory: /config/OptimalScheduler/MyClassesCode
schema:
  Controllable_Consumer_asset_IDs: #"Controllable assets that consume energy."
    - match(^(.+)$)  
  Controllable_Generator_asset_IDs: #"Controllable generators that produce energy."
    - match(^(.+)$)  
  Controllable_Energy_Source_asset_IDs: #"Controllable batteries, solar panels, etc."
    - match(^(.+)$)  
  Base_Building_consumption_IDs: #"Fixed consumption of the building."
    - match(^(.+)$) 
  Base_Building_generation_IDs: #"Fixed generation of the building."
    - match(^(.+)$) 
  Simulation_code_directory: str
  Classes_code_directory: str
